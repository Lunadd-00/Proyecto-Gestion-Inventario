<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <head th:fragment="head">
        <meta charset="UTF-8"/>
        <title>Inventario</title>
        <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
        <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    </head>

    <header th:fragment="header">
        <nav class="navbar navbar-expand-sm navbar-light bg-light border-bottom mb-3">
            <div class="container-fluid">
                <a class="navbar-brand" th:href="@{/}">Departamentos de Gestión de Riesgos</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" th:href="@{/item/listado}">Items</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/categoria/listado}">Categorias</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/proveedor/listado}">Proveedores</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/usuario/listado}">Usuarios</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <footer th:fragment="footer" class="border-top mt-4 p-2 text-center text-muted small">
        <p>Municipalidad de Escazú</p>
    </footer>

    <section th:fragment="mostrarToast">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${todoOk}" class="alert alert-success" th:text="${todoOk}"></div>
    </section>

</html>
