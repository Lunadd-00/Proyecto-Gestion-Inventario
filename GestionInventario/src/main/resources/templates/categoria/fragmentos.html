<!-- Fragmento 1 agregar categoria -->
<section th:fragment="agregarCategoria">
    <div class='row py-4 mb-2 bg-light'>
        <div class='col-md-1'></div>
        <div class='col-md-3'>
            <button type="button"
                    class=" btn btn-primary"
                    sec:authorize="hasRole('ROLE_ADMIN')"
                    data-bs-toggle="modal"
                    data-bs-target="#agregarCategoriaModal">
                <i class="fa-solid fa-plus"></i>
                [[#{categoria.agregar}]]
            </button>
        </div>
    </div>
    <!-- Modal -->
    <div class="modal fade"
         id="agregarCategoriaModal"
         tabindex="-1"
         aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-info">
                    <h5 class="modal-title">
                        [[#{categoria.agregar}]]
                    </h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/categoria/guardar}"
                      th:object="${categoria}"
                      method="post"
                      class="was-validated">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label>[[#{categoria.nombre}]]</label>
                            <input type="text"
                                   class="form-control"
                                   name="nombre"
                                   required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark"></i>
                            [[#{accion.cerrar}]]
                        </button>
                        <button type="submit"
                                class="btn btn-primary">
                            <i class="fa-solid fa-floppy-disk"></i>
                            [[#{accion.guardar}]]
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<!-- Fragmento 2 listado de categorias -->
<section th:fragment="listadoCategoria" class="p-3">
    <div class="row p-3 justify-content-center">
        <div class="col-md-9">
            <div class="card p-2">
                <div class="card-header">
                    <h4>[[#{categoria.listado}]]</h4>
                </div>
                <div class="card-body">
                    <div th:if="${categorias != null and !categorias.empty}">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>[[#{categoria.nombre}]]</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="c : ${categorias}">
                                    <td>[[${c.id}]]</td>
                                    <td>[[${c.nombre}]]</td>
                                    <td>
                                        <button type="button"
                                                class="btn btn-danger"
                                                data-bs-toggle="modal"
                                                data-bs-target="#confirmModal"
                                                th:data-bs-id="${c.id}"
                                                th:data-bs-nombre="${c.nombre}">
                                            [[#{accion.eliminar}]]
                                        </button>
                                        <a th:href="@{/categoria/modificar/}+${c.id}" class=" btn btn-warning text-white">
                                            [[#{accion.actualizar}]]
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="text-center p-2"
                         th:if="${categorias == null or categorias.empty}">
                        <span>[[#{lista.vacia}]]</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Fragmento 3 editar categorias -->
<section th:fragment="editarCategoria">
    <div class="row">
        <div class="col-md-2"></div>
        <div class="col-md-8">
            <form method="POST"
                  th:action="@{/categoria/guardar}"
                  th:object="${categoria}"
                  class="was-validated">
                <input type="hidden"
                       name="id"
                       th:field="*{id}"/>
                <div class="row py-4 mb-4 bg-light">
                    <div class="col-md-4 d-grid">
                        <a th:href="@{/categoria/listado}"
                           class="btn btn-primary">
                            <i class="fas fa-arrow-left"></i>
                            [[#{accion.regresar}]]
                        </a>
                    </div>
                    <div class="col-md-4 d-grid">
                        <button type="submit"
                                class="btn btn-success">
                            <i class="fas fa-check"></i>
                            [[#{accion.guardar}]]
                        </button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h4>[[#{accion.actualizar}]]</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label>[[#{categoria.nombre}]]</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{nombre}"
                                   required>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>

<!-- Fragmento 4 eliminar categorias -->
<section th:fragment="confirmarEliminarCategoria">
    <div class="modal fade" 
         id="confirmModal" 
         tabindex="-1" 
         aria-labelledby="modalLabel" 
         aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered custom-modal-animation">
            <div class="modal-content animate-slide-up">
                <form th:action="@{/categoria/eliminar}" th:object="${categoria}" method="post">
                    <input type="hidden" name="id" id="modalId"/>
                    <div class="modal-header bg-warning text-white">
                        <h5 class="modal-title" id="modalLabel">
                            <i class="fa-solid fa-circle-radiation"></i> [[#{accion.confirmar}]]
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body">
                        <p>[[#{accion.confirmar.texto1}]] <span id="modalnombre"></span>?</p>
                        <h6>[[#{accion.confirmar.texto2}]]</h6>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-danger">
                            <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                        </button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
