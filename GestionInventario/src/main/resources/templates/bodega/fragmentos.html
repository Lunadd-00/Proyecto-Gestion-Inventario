<!-- ═══ Fragmento: Botón + Modal Agregar Bodega ═══ -->
<section th:fragment="agregarBodega">
    <div class="row py-4 mb-2 bg-light">
        <div class="col-md-1"></div>
        <div class="col-md-3">
            <button type="button" class="btn btn-primary"
                    sec:authorize="hasRole('ROLE_ADMIN')"
                    data-bs-toggle="modal" data-bs-target="#modalAgregarBodega">
                <i class="fa-solid fa-plus"></i>
                [[#{bodega.agregar}]]
            </button>
        </div>
    </div>

    <!-- Modal Agregar -->
    <div class="modal fade" id="modalAgregarBodega" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background:#1cb6b8; color:white;">
                    <h5 class="modal-title">
                        <i class="fa-solid fa-warehouse me-2"></i>[[#{bodega.agregar}]]
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/bodega/guardar}" method="post" class="was-validated">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">[[#{bodega.nombre}]] *</label>
                            <input type="text" class="form-control" name="nombre"
                                   maxlength="100" required
                                   placeholder="Ej: Bodega Central"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">[[#{bodega.ubicacion}]]</label>
                            <input type="text" class="form-control" name="ubicacion"
                                   maxlength="255"
                                   placeholder="Ej: Edificio A, Planta Baja"/>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-floppy-disk"></i> [[#{accion.guardar}]]
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>


<!-- ═══ Fragmento: Tabla de Bodegas ═══ -->
<section th:fragment="listadoBodega" class="p-3">
    <div class="row p-3 justify-content-center">
        <div class="col-md-9">
            <div class="card p-2">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4>
                        [[#{bodega.listado}]]
                        <span class="fs-6 fw-normal text-muted">
                            (Total: <span th:text="${totalBodegas}">0</span>)
                        </span>
                    </h4>
                </div>
                <div class="card-body">
                    <div th:if="${bodegas != null and !bodegas.empty}">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>[[#{bodega.nombre}]]</th>
                                    <th>[[#{bodega.ubicacion}]]</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="b : ${bodegas}">
                                    <td th:text="${b.id}"></td>
                                    <td th:text="${b.nombre}"></td>
                                    <td th:text="${b.ubicacion != null ? b.ubicacion : '—'}"></td>
                                    <td>
                                        <a th:href="@{/bodega/modificar/}+${b.id}"
                                           class="btn btn-warning btn-sm text-white"
                                           sec:authorize="hasRole('ROLE_ADMIN')">
                                            <i class="fa-solid fa-pen"></i> [[#{accion.actualizar}]]
                                        </a>
                                        <button type="button"
                                                class="btn btn-danger btn-sm"
                                                sec:authorize="hasRole('ROLE_ADMIN')"
                                                data-bs-toggle="modal"
                                                data-bs-target="#confirmEliminarBodega"
                                                th:data-bs-id="${b.id}"
                                                th:data-bs-nombre="${b.nombre}">
                                            <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="text-center p-2" th:if="${bodegas == null or bodegas.empty}">
                        <span class="text-muted">[[#{lista.vacia}]]</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>


<!-- ═══ Fragmento: Modal Confirmar Eliminar ═══ -->
<section th:fragment="confirmarEliminarBodega">
    <div class="modal fade" id="confirmEliminarBodega" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/bodega/eliminar}" method="post">
                    <input type="hidden" name="id" id="bodegaModalId"/>
                    <div class="modal-header bg-warning text-white">
                        <h5 class="modal-title">
                            <i class="fa-solid fa-triangle-exclamation"></i> [[#{accion.confirmar}]]
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>[[#{accion.confirmar.texto1}]] <strong id="bodegaModalNombre"></strong>?</p>
                        <h6 class="text-danger">[[#{accion.confirmar.texto2}]]</h6>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-danger">
                            <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                        </button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        var confirmEliminarBodega = document.getElementById('confirmEliminarBodega');
        if (confirmEliminarBodega) {
            confirmEliminarBodega.addEventListener('show.bs.modal', function (event) {
                var btn = event.relatedTarget;
                document.getElementById('bodegaModalId').value    = btn.getAttribute('data-bs-id');
                document.getElementById('bodegaModalNombre').textContent = btn.getAttribute('data-bs-nombre');
            });
        }
    </script>
</section>
